<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de O.S. - Kuba Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/style.css">

</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-3 shadow">
        <div class="d-flex align-items-center">
            <button class="btn btn-outline-light me-3" id="menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            <span class="navbar-brand mb-0 h1">Kuba Tech</span>
        </div>
    </nav>

    <div class="d-flex" id="wrapper">
        <div class="bg-dark text-white shadow-sm" id="sidebar">
            <div class="list-group list-group-flush mt-3">
                <button class="list-group-item list-group-item-action bg-dark text-white nav-item active" data-target="home">
                    <i class="fas fa-home me-2"></i> Dashboard
                </button>
                <button class="list-group-item list-group-item-action bg-dark text-white nav-item" data-target="clientes">
                    <i class="fas fa-users me-2"></i> Clientes
                </button>
                <button class="list-group-item list-group-item-action bg-dark text-white nav-item" data-target="dispositivos">
                    <i class="fas fa-laptop-medical me-2"></i> Dispositivos
                </button>
                <button class="list-group-item list-group-item-action bg-dark text-white nav-item" data-target="os">
                    <i class="fas fa-file-invoice me-2"></i> Ordens de Serviço
                </button>
            </div>
        </div>

        <div id="main-content" class="container-fluid p-4">
            
            <section id="home" class="page active">
                <h2 class="mb-4">Visão Geral</h2>
                <div class="row">
                    <div class="col-md-4">
                        <div class="card text-white bg-danger mb-3 shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">A Realizar</h5>
                                <p class="card-text display-4 fw-bold" id="count-todo">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-dark bg-warning mb-3 shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">Em Andamento</h5>
                                <p class="card-text display-4 fw-bold" id="count-progress">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-success mb-3 shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">Finalizadas</h5>
                                <p class="card-text display-4 fw-bold" id="count-done">0</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="clientes" class="page">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Gestão de Clientes</h2>
                    <button class="btn btn-primary shadow-sm" onclick="toggleForm('form-cliente')"><i class="fas fa-plus me-1"></i> Novo Cliente</button>
                </div>
                
                <form id="form-cliente" class="hidden-form card p-4 shadow-sm mb-4" onsubmit="saveCustomer(event)">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">CPF</label>
                            <input type="text" class="form-control" id="cli-cpf" placeholder="CPF" maxlength="14" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="cli-nome" placeholder="Nome Completo" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Telefone</label>
                            <input type="text" class="form-control" id="cli-tel" placeholder="Telefone" maxlength="15" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="cli-email" placeholder="E-mail" required>
                        </div>
                    </div>
                    <div class="mt-3 text-end">
                        <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i> Salvar</button>
                    </div>
                </form>

                <div class="card shadow-sm">
                    <div class="card-body p-0 table-responsive">
                        <table class="table table-hover table-striped mb-0" id="table-clientes">
                            <thead class="table-dark">
                                <tr><th>CPF</th><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Ações</th></tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="dispositivos" class="page">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Gestão de Dispositivos</h2>
                    <button class="btn btn-primary shadow-sm" onclick="toggleForm('form-dispositivo')"><i class="fas fa-plus me-1"></i> Novo Dispositivo</button>
                </div>

                <form id="form-dispositivo" class="hidden-form card p-4 shadow-sm mb-4" onsubmit="saveDevice(event)">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Serial Number / IMEI</label>
                            <input type="text" class="form-control" id="dev-serial" placeholder="Numero de Serie" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CPF do Cliente (Dono)</label>
                            <input type="text" class="form-control" id="dev-cpf" placeholder="CPF" maxlength="14" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tipo de Aparelho</label>
                            <input type="text" class="form-control" id="dev-tipo" placeholder="Tipo (Celular, Notebook, PC)" required>
                        </div>
                    </div>
                    <div class="mt-3 text-end">
                        <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i> Salvar</button>
                    </div>
                </form>

                <div class="card shadow-sm">
                    <div class="card-body p-0 table-responsive">
                        <table class="table table-hover table-striped mb-0" id="table-dispositivos">
                            <thead class="table-dark">
                                <tr><th>Serial</th><th>CPF</th><th>Tipo</th><th>Ações</th></tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="os" class="page">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Ordens de Serviço</h2>
                    <button class="btn btn-primary shadow-sm" onclick="toggleForm('form-os')"><i class="fas fa-plus me-1"></i> Nova O.S.</button>
                </div>

                <form id="form-os" class="hidden-form card p-4 shadow-sm mb-4" onsubmit="saveOS(event)">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">CPF do Cliente</label>
                            <input type="text" class="form-control" id="os-cpf" placeholder="CPF" maxlength="14" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Serial do Aparelho</label>
                            <input type="text" class="form-control" id="os-serial" placeholder="Numero de Serie" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Técnico</label>
                            <input type="text" class="form-control" id="os-tecnico" placeholder="Nome do Técnico" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Data e Status</label>
                            <div class="input-group">
                                <input type="date" class="form-control" id="os-data" required>
                                <select class="form-select" id="os-status">
                                    <option value="A Realizar">A Realizar</option>
                                    <option value="Em Andamento">Em Andamento</option>
                                    <option value="Finalizada">Finalizada</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label text-primary fw-bold" id="label-historico" style="display: none;">
                                <i class="fas fa-history me-1"></i> Defeito
                            </label>
                            <div id="os-historico-problema" style="display: none;"></div>

                            <label class="form-label fw-bold" id="label-os-problema">Defeito / Descrição do Problema</label>
                            <textarea class="form-control" id="os-problema" rows="3" placeholder="Descreva o defeito ou a nova atualização aqui..." required></textarea>
                        </div>
                    </div>
                    <div class="mt-3 text-end">
                        <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i> Salvar O.S.</button>
                    </div>
                </form>

                <div class="card shadow-sm">
                    <div class="card-body p-0 table-responsive">
                        <table class="table table-hover table-striped mb-0" id="table-os">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>CPF</th>
                                    <th>Serial</th>
                                    <th>Técnico</th>
                                    <th>Data</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                    <th>Defeito</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/frontend/js/app.js"></script>
</body>
</html>
